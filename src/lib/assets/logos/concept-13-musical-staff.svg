<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 13: Musical Staff — five staff lines with N and J placed as noteheads -->

  <g transform="translate(15, 18)">
    <!-- Five staff lines -->
    <line x1="0" y1="16" x2="80" y2="16" stroke="#c8a96e" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="26" x2="80" y2="26" stroke="#c8a96e" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="36" x2="80" y2="36" stroke="#c8a96e" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="46" x2="80" y2="46" stroke="#c8a96e" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="56" x2="80" y2="56" stroke="#c8a96e" stroke-width="0.5" opacity="0.25"/>

    <!-- Treble clef suggestion (simplified) -->
    <path d="M6,20 C2,28 2,38 6,46 C8,50 10,50 10,46 C10,40 6,34 4,36 C2,38 4,42 8,40"
      fill="none" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

    <!-- "N" as a note — notehead on a line -->
    <ellipse cx="28" cy="36" rx="6" ry="4.5" transform="rotate(-15, 28, 36)" fill="#c8a96e" opacity="0.85"/>
    <!-- N stem -->
    <line x1="33.5" y1="36" x2="33.5" y2="12" stroke="#c8a96e" stroke-width="1.5" opacity="0.85"/>
    <!-- N flag -->
    <path d="M33.5,12 C38,14 40,20 37,26" fill="none" stroke="#c8a96e" stroke-width="1.2" opacity="0.7"/>
    <!-- "N" letter inside notehead -->
    <text x="28" y="38" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, serif" font-size="6" fill="#0a0a0a" font-weight="700">N</text>

    <!-- "J" as a note — notehead on a space -->
    <ellipse cx="52" cy="26" rx="6" ry="4.5" transform="rotate(-15, 52, 26)" fill="#c8a96e" opacity="0.85"/>
    <!-- J stem -->
    <line x1="57.5" y1="26" x2="57.5" y2="6" stroke="#c8a96e" stroke-width="1.5" opacity="0.85"/>
    <!-- J flag -->
    <path d="M57.5,6 C62,8 64,14 61,20" fill="none" stroke="#c8a96e" stroke-width="1.2" opacity="0.7"/>
    <!-- "J" letter inside notehead -->
    <text x="52" y="28" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, serif" font-size="6" fill="#0a0a0a" font-weight="700">J</text>

    <!-- Bar line -->
    <line x1="74" y1="16" x2="74" y2="56" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
    <line x1="78" y1="16" x2="78" y2="56" stroke="#c8a96e" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
