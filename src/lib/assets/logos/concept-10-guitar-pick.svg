<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 10: Guitar Pick — plectrum silhouette containing NJ monogram -->

  <g transform="translate(46, 6)">
    <!-- Pick outline — rounded triangle -->
    <path d="M22,2 C36,2 44,12 44,26 C44,44 22,80 22,80 C22,80 0,44 0,26 C0,12 8,2 22,2 Z"
      fill="none" stroke="#c8a96e" stroke-width="1.5" opacity="0.6"/>

    <!-- Inner bevel line -->
    <path d="M22,8 C32,8 38,15 38,26 C38,40 22,68 22,68 C22,68 6,40 6,26 C6,15 12,8 22,8 Z"
      fill="none" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>

    <!-- NJ inside pick -->
    <text x="22" y="36" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="16" letter-spacing="1" fill="#c8a96e" opacity="0.9">NJ</text>

    <!-- Subtle "music" curved along bottom of pick -->
    <text x="22" y="52" text-anchor="middle"
      font-family="system-ui, sans-serif"
      font-size="5" letter-spacing="2" fill="#c8a96e" opacity="0.3">music</text>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
