<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 9: Sound Ripple — expanding concentric arcs emanating from a point, like sound in water -->

  <g transform="translate(50, 50)">
    <!-- Center point -->
    <circle cx="0" cy="0" r="3" fill="#c8a96e"/>

    <!-- Expanding arcs (right half only, like a speaker cone emission) -->
    <path d="M6,-8 A10,10 0 0,1 6,8" fill="none" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    <path d="M12,-16 A20,20 0 0,1 12,16" fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <path d="M18,-24 A30,30 0 0,1 18,24" fill="none" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <path d="M24,-32 A40,40 0 0,1 24,32" fill="none" stroke="#c8a96e" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <path d="M30,-38 A48,48 0 0,1 30,38" fill="none" stroke="#c8a96e" stroke-width="0.5" stroke-linecap="round" opacity="0.12"/>

    <!-- Left side reflection (subtle) -->
    <path d="M-6,-6 A8,8 0 0,0 -6,6" fill="none" stroke="#c8a96e" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <path d="M-10,-12 A15,15 0 0,0 -10,12" fill="none" stroke="#c8a96e" stroke-width="0.6" stroke-linecap="round" opacity="0.15"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="125" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="125" y1="48" x2="195" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="125" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
