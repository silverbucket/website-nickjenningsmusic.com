<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 15: Spiral Groove — single continuous golden spiral, suggesting both vinyl groove and golden ratio -->

  <g transform="translate(50, 50)">
    <!-- Continuous spiral from center outward -->
    <path d="M0,0
      C0,-2 2,-4 4,-4
      C8,-4 8,0 8,2
      C8,7 3,10 -2,10
      C-9,10 -14,4 -14,-3
      C-14,-12 -7,-19 2,-19
      C14,-19 22,-10 22,2
      C22,17 12,26 -2,26
      C-20,26 -30,-4 -30,-3
      C-30,-22 -18,-34 2,-34
      C24,-34 36,2 36,2
      C36,26 20,40 -2,40"
      fill="none" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

    <!-- Inner emphasis -->
    <path d="M0,0 C0,-2 2,-4 4,-4 C8,-4 8,0 8,2 C8,7 3,10 -2,10"
      fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.5" fill="#c8a96e" opacity="0.7"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
