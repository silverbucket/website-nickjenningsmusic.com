<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 14: Bow & Strings — abstract violin bow crossing over strings -->

  <g transform="translate(20, 10)">
    <!-- Four strings (vertical, parallel) -->
    <line x1="20" y1="5" x2="20" y2="78" stroke="#c8a96e" stroke-width="0.6" opacity="0.2"/>
    <line x1="32" y1="5" x2="32" y2="78" stroke="#c8a96e" stroke-width="0.8" opacity="0.25"/>
    <line x1="44" y1="5" x2="44" y2="78" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
    <line x1="56" y1="5" x2="56" y2="78" stroke="#c8a96e" stroke-width="1.2" opacity="0.35"/>

    <!-- Bow — diagonal elegant arc crossing the strings -->
    <path d="M4,70 C20,62 50,22 72,12"
      fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Bow hair (slightly offset, thinner) -->
    <path d="M6,72 C22,64 52,24 74,14"
      fill="none" stroke="#d4b97e" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

    <!-- Bow frog (bottom end detail) -->
    <rect x="1" y="69" width="8" height="4" rx="1" fill="#c8a96e" opacity="0.4"/>

    <!-- Bow tip (top end) -->
    <path d="M72,12 L76,10 L74,14" fill="#c8a96e" opacity="0.4"/>

    <!-- Contact point glow — where bow meets strings -->
    <circle cx="38" cy="42" r="4" fill="#c8a96e" opacity="0.08"/>
    <circle cx="38" cy="42" r="2" fill="#c8a96e" opacity="0.12"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
