<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <g transform="translate(16, 16)">
    <!-- Rosette rings -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
    <circle cx="0" cy="0" r="10.5" fill="none" stroke="#c8a96e" stroke-width="1.5"
      stroke-dasharray="1.5 1.2" opacity="0.2"/>
    <circle cx="0" cy="0" r="8.5" fill="none" stroke="#c8a96e" stroke-width="0.5" opacity="0.3"/>
    <!-- Void -->
    <circle cx="0" cy="0" r="6" fill="#0a0a0a"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#c8a96e" stroke-width="0.4" opacity="0.4"/>
    <!-- NJ -->
    <text x="0" y="1" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, serif" font-size="5.5" letter-spacing="0.5"
      fill="#c8a96e" opacity="0.8">NJ</text>
  </g>
</svg>
