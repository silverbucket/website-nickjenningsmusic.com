<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 17: Constellation — NJ letterforms traced as star constellations with connecting lines -->

  <g transform="translate(18, 10)">
    <!-- N constellation -->
    <!-- N stars (vertices) -->
    <circle cx="8" cy="68" r="2" fill="#c8a96e" opacity="0.9"/>
    <circle cx="8" cy="10" r="2.5" fill="#c8a96e" opacity="1"/>
    <circle cx="18" cy="38" r="1.5" fill="#c8a96e" opacity="0.7"/>
    <circle cx="32" cy="68" r="2" fill="#c8a96e" opacity="0.9"/>
    <circle cx="32" cy="10" r="2" fill="#c8a96e" opacity="0.85"/>

    <!-- N connecting lines -->
    <line x1="8" y1="68" x2="8" y2="10" stroke="#c8a96e" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="10" x2="32" y2="68" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <line x1="32" y1="68" x2="32" y2="10" stroke="#c8a96e" stroke-width="0.8" opacity="0.4"/>

    <!-- J constellation -->
    <circle cx="52" cy="10" r="1.8" fill="#c8a96e" opacity="0.85"/>
    <circle cx="46" cy="10" r="1.2" fill="#c8a96e" opacity="0.6"/>
    <circle cx="58" cy="10" r="1.2" fill="#c8a96e" opacity="0.6"/>
    <circle cx="52" cy="50" r="1.5" fill="#c8a96e" opacity="0.75"/>
    <circle cx="48" cy="62" r="1.8" fill="#c8a96e" opacity="0.8"/>
    <circle cx="40" cy="68" r="2" fill="#c8a96e" opacity="0.9"/>
    <circle cx="36" cy="62" r="1.5" fill="#c8a96e" opacity="0.7"/>

    <!-- J connecting lines -->
    <line x1="46" y1="10" x2="58" y2="10" stroke="#c8a96e" stroke-width="0.6" opacity="0.3"/>
    <line x1="52" y1="10" x2="52" y2="50" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <line x1="52" y1="50" x2="48" y2="62" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <line x1="48" y1="62" x2="40" y2="68" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <line x1="40" y1="68" x2="36" y2="62" stroke="#c8a96e" stroke-width="0.6" opacity="0.3"/>

    <!-- Scattered dim background stars -->
    <circle cx="22" cy="5" r="0.6" fill="#c8a96e" opacity="0.15"/>
    <circle cx="62" cy="35" r="0.5" fill="#c8a96e" opacity="0.12"/>
    <circle cx="2" cy="45" r="0.7" fill="#c8a96e" opacity="0.1"/>
    <circle cx="44" cy="75" r="0.5" fill="#c8a96e" opacity="0.12"/>
    <circle cx="68" cy="15" r="0.6" fill="#c8a96e" opacity="0.1"/>
    <circle cx="14" cy="78" r="0.5" fill="#c8a96e" opacity="0.08"/>
    <circle cx="60" cy="60" r="0.4" fill="#c8a96e" opacity="0.1"/>

    <!-- Star glows on brightest points -->
    <circle cx="8" cy="10" r="6" fill="#c8a96e" opacity="0.04"/>
    <circle cx="40" cy="68" r="5" fill="#c8a96e" opacity="0.04"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="105" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="105" y1="48" x2="175" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="105" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
