<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <g transform="translate(4, 7)">
    <!-- Staff lines -->
    <line x1="2" y1="4" x2="28" y2="4" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>
    <line x1="2" y1="8" x2="28" y2="8" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>
    <line x1="2" y1="12" x2="28" y2="12" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>
    <line x1="2" y1="16" x2="28" y2="16" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>
    <line x1="2" y1="20" x2="28" y2="20" stroke="#c8a96e" stroke-width="0.4" opacity="0.2"/>
    <!-- N notehead -->
    <ellipse cx="10" cy="12" rx="3.5" ry="2.5" transform="rotate(-15, 10, 12)" fill="#c8a96e" opacity="0.85"/>
    <line x1="13" y1="12" x2="13" y2="3" stroke="#c8a96e" stroke-width="1" opacity="0.8"/>
    <!-- J notehead -->
    <ellipse cx="20" cy="8" rx="3.5" ry="2.5" transform="rotate(-15, 20, 8)" fill="#c8a96e" opacity="0.85"/>
    <line x1="23" y1="8" x2="23" y2="0" stroke="#c8a96e" stroke-width="1" opacity="0.8"/>
  </g>
</svg>
