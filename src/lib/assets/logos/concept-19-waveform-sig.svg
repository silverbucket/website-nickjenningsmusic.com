<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 19: Waveform Signature — audio waveform that traces the cursive shape of "NJ" -->

  <g transform="translate(10, 8)">
    <!-- Waveform that follows a cursive NJ path — vertical bars with heights modulated along cursive trajectory -->
    <!-- The bars are placed along the stroke of a handwritten NJ, creating a waveform-signature hybrid -->

    <!-- N upstroke (left vertical) — tall bars -->
    <rect x="8" y="10" width="2" height="62" rx="1" fill="#c8a96e" opacity="0.7"/>
    <rect x="12" y="14" width="2" height="54" rx="1" fill="#c8a96e" opacity="0.6"/>
    <rect x="16" y="18" width="2" height="46" rx="1" fill="#c8a96e" opacity="0.5"/>

    <!-- N diagonal — bars descending then ascending -->
    <rect x="20" y="20" width="2" height="38" rx="1" fill="#c8a96e" opacity="0.45"/>
    <rect x="24" y="26" width="2" height="28" rx="1" fill="#c8a96e" opacity="0.4"/>
    <rect x="28" y="30" width="2" height="22" rx="1" fill="#c8a96e" opacity="0.35"/>
    <rect x="32" y="28" width="2" height="26" rx="1" fill="#c8a96e" opacity="0.4"/>
    <rect x="36" y="24" width="2" height="32" rx="1" fill="#c8a96e" opacity="0.45"/>

    <!-- N right vertical — tall bars again -->
    <rect x="40" y="18" width="2" height="46" rx="1" fill="#c8a96e" opacity="0.55"/>
    <rect x="44" y="14" width="2" height="54" rx="1" fill="#c8a96e" opacity="0.65"/>
    <rect x="48" y="10" width="2" height="62" rx="1" fill="#c8a96e" opacity="0.75"/>

    <!-- Connecting stroke N->J — small bars -->
    <rect x="52" y="28" width="2" height="18" rx="1" fill="#c8a96e" opacity="0.3"/>
    <rect x="56" y="30" width="2" height="14" rx="1" fill="#c8a96e" opacity="0.25"/>

    <!-- J vertical — medium bars -->
    <rect x="60" y="16" width="2" height="48" rx="1" fill="#c8a96e" opacity="0.55"/>
    <rect x="64" y="14" width="2" height="52" rx="1" fill="#c8a96e" opacity="0.65"/>
    <rect x="68" y="16" width="2" height="50" rx="1" fill="#c8a96e" opacity="0.6"/>

    <!-- J curve — bars curving down and left -->
    <rect x="70" y="22" width="2" height="48" rx="1" fill="#c8a96e" opacity="0.5"/>
    <rect x="72" y="30" width="2" height="44" rx="1" fill="#c8a96e" opacity="0.45"/>
    <rect x="74" y="38" width="2" height="38" rx="1" fill="#c8a96e" opacity="0.4"/>
    <rect x="74" y="46" width="2" height="30" rx="1" fill="#c8a96e" opacity="0.35"/>
    <rect x="72" y="52" width="2" height="24" rx="1" fill="#c8a96e" opacity="0.3"/>
    <rect x="68" y="56" width="2" height="20" rx="1" fill="#c8a96e" opacity="0.25"/>
    <rect x="64" y="58" width="2" height="16" rx="1" fill="#c8a96e" opacity="0.2"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
