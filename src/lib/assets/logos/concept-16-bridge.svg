<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 16: Bridge — abstract violin/guitar bridge silhouette, architectural and musical -->

  <g transform="translate(20, 12)">
    <!-- Bridge profile — elegant arched shape -->
    <path d="M10,65 L10,30 C10,20 18,10 30,10 L40,10 C52,10 60,20 60,30 L60,65"
      fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- Bridge cutouts (f-hole inspired) -->
    <path d="M24,28 C22,32 22,40 24,44" fill="none" stroke="#c8a96e" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <circle cx="24" cy="26" r="1.2" fill="#c8a96e" opacity="0.3"/>
    <circle cx="24" cy="46" r="1.2" fill="#c8a96e" opacity="0.3"/>

    <path d="M46,28 C48,32 48,40 46,44" fill="none" stroke="#c8a96e" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <circle cx="46" cy="26" r="1.2" fill="#c8a96e" opacity="0.3"/>
    <circle cx="46" cy="46" r="1.2" fill="#c8a96e" opacity="0.3"/>

    <!-- Bridge feet -->
    <rect x="6" y="65" width="12" height="3" rx="1" fill="#c8a96e" opacity="0.4"/>
    <rect x="52" y="65" width="12" height="3" rx="1" fill="#c8a96e" opacity="0.4"/>

    <!-- Strings over bridge (horizontal) -->
    <line x1="0" y1="10" x2="70" y2="10" stroke="#c8a96e" stroke-width="0.4" opacity="0.15"/>
    <line x1="0" y1="14" x2="70" y2="14" stroke="#c8a96e" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="18" x2="70" y2="18" stroke="#c8a96e" stroke-width="0.6" opacity="0.15"/>
    <line x1="0" y1="22" x2="70" y2="22" stroke="#c8a96e" stroke-width="0.7" opacity="0.15"/>

    <!-- NJ centered in the arch -->
    <text x="35" y="56" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="12" letter-spacing="2" fill="#c8a96e" opacity="0.6">NJ</text>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
