<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <g transform="translate(10, 4)">
    <!-- Left prong -->
    <path d="M2,3 L2,13" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"/>
    <!-- Right prong -->
    <path d="M10,3 L10,13" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"/>
    <!-- N diagonal -->
    <path d="M3,4 L9,12" fill="none" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <!-- Curved base -->
    <path d="M2,13 C2,18 10,18 10,13" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"/>
    <!-- Handle -->
    <path d="M6,17 L6,25" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="6" cy="26" r="1.5" fill="#c8a96e" opacity="0.5"/>
  </g>
</svg>
