<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Concept 3 Favicon: Sound wave bars (N-shaped) -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>

  <g transform="translate(5, 6)">
    <!-- 5 bars forming N silhouette -->
    <!-- Bar 1 (tall) -->
    <rect x="0" y="2" width="3" height="16" rx="1.5" fill="#c8a96e" opacity="0.95"/>
    <!-- Bar 2 (medium, descending) -->
    <rect x="5.5" y="6" width="3" height="10" rx="1.5" fill="#c8a96e" opacity="0.65"/>
    <!-- Bar 3 (short, valley) -->
    <rect x="11" y="8" width="3" height="6" rx="1.5" fill="#c8a96e" opacity="0.45"/>
    <!-- Bar 4 (medium, ascending) -->
    <rect x="16.5" y="5" width="3" height="11" rx="1.5" fill="#c8a96e" opacity="0.7"/>
    <!-- Bar 5 (tall) -->
    <rect x="22" y="2" width="3" height="16" rx="1.5" fill="#c8a96e" opacity="0.95"/>
  </g>
</svg>
