<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 7: Vinyl Record Motif — concentric circles with NJ center label -->

  <g transform="translate(50, 50)">
    <!-- Outer groove rings -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8a96e" stroke-width="0.4" opacity="0.15"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#c8a96e" stroke-width="0.3" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c8a96e" stroke-width="0.3" opacity="0.25"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#c8a96e" stroke-width="0.4" opacity="0.3"/>

    <!-- Groove texture — dashed circles -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#c8a96e" stroke-width="0.2"
      stroke-dasharray="1.5 3" opacity="0.12"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#c8a96e" stroke-width="0.2"
      stroke-dasharray="1 2.5" opacity="0.1"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#c8a96e" stroke-width="0.2"
      stroke-dasharray="2 4" opacity="0.1"/>

    <!-- Record edge -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>

    <!-- Label area -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#c8a96e" stroke-width="0.6" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#0a0a0a" stroke="none"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#c8a96e" stroke-width="0.3" opacity="0.3"/>

    <!-- Center spindle hole -->
    <circle cx="0" cy="0" r="2" fill="#c8a96e" opacity="0.3"/>

    <!-- Tonearm -->
    <line x1="28" y1="-42" x2="12" y2="-18" stroke="#c8a96e" stroke-width="1" opacity="0.3"/>
    <circle cx="12" cy="-18" r="1.5" fill="#c8a96e" opacity="0.25"/>
    <!-- Tonearm pivot -->
    <circle cx="30" cy="-44" r="3" fill="none" stroke="#c8a96e" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="110" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>

  <!-- Thin gold separator -->
  <line x1="110" y1="48" x2="180" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>

  <!-- Text: music -->
  <text x="110" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
