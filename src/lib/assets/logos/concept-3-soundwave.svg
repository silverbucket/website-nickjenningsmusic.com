<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 3: Abstract Sound Wave — Equalizer bars suggesting "N" -->

  <!-- Sound wave bars — heights form N shape: tall, descending, ascending, tall -->
  <g transform="translate(20, 12)">
    <!-- Bar 1 (N left, tall) -->
    <rect x="0" y="10" width="5" height="56" rx="2.5" fill="#c8a96e" opacity="0.95"/>
    <!-- Bar 2 (N left upper, medium-tall) -->
    <rect x="10" y="18" width="5" height="40" rx="2.5" fill="#c8a96e" opacity="0.8"/>
    <!-- Bar 3 (N diagonal descending, medium) -->
    <rect x="20" y="24" width="5" height="32" rx="2.5" fill="#c8a96e" opacity="0.65"/>
    <!-- Bar 4 (N bottom/valley, short) -->
    <rect x="30" y="32" width="5" height="22" rx="2.5" fill="#c8a96e" opacity="0.5"/>
    <!-- Bar 5 (N diagonal ascending, short-medium) -->
    <rect x="40" y="28" width="5" height="28" rx="2.5" fill="#c8a96e" opacity="0.55"/>
    <!-- Bar 6 (N right ascending, medium) -->
    <rect x="50" y="22" width="5" height="34" rx="2.5" fill="#c8a96e" opacity="0.7"/>
    <!-- Bar 7 (N right upper, medium-tall) -->
    <rect x="60" y="16" width="5" height="44" rx="2.5" fill="#c8a96e" opacity="0.85"/>
    <!-- Bar 8 (N right, tall) -->
    <rect x="70" y="10" width="5" height="56" rx="2.5" fill="#c8a96e" opacity="0.95"/>
    <!-- Bar 9 (trailing, fading) -->
    <rect x="80" y="26" width="5" height="24" rx="2.5" fill="#c8a96e" opacity="0.3"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="125" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>

  <!-- Thin gold separator -->
  <line x1="125" y1="48" x2="195" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>

  <!-- Text: music -->
  <text x="125" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
