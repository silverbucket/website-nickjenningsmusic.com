<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 18: F-Hole — elegant violin f-hole shape that mirrors into an abstract N -->

  <g transform="translate(30, 6)">
    <!-- Left f-hole (mirrored to suggest left stroke of N) -->
    <path d="M18,8 C14,8 10,14 10,22 L10,36 C10,40 12,44 16,46 C12,48 10,52 10,56 L10,70 C10,78 14,84 18,84"
      fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <!-- Left f-hole notches -->
    <circle cx="14" cy="30" r="1.5" fill="#c8a96e" opacity="0.5"/>
    <circle cx="14" cy="62" r="1.5" fill="#c8a96e" opacity="0.5"/>

    <!-- Right f-hole (mirrored, suggesting right stroke of N) -->
    <path d="M50,8 C54,8 58,14 58,22 L58,36 C58,40 56,44 52,46 C56,48 58,52 58,56 L58,70 C58,78 54,84 50,84"
      fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <!-- Right f-hole notches -->
    <circle cx="54" cy="30" r="1.5" fill="#c8a96e" opacity="0.5"/>
    <circle cx="54" cy="62" r="1.5" fill="#c8a96e" opacity="0.5"/>

    <!-- Diagonal connecting line (N diagonal) -->
    <line x1="18" y1="12" x2="50" y2="80" stroke="#c8a96e" stroke-width="1.2" opacity="0.3"/>

    <!-- Center axis line (subtle) -->
    <line x1="34" y1="2" x2="34" y2="88" stroke="#c8a96e" stroke-width="0.3" opacity="0.1"/>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="115" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="115" y1="48" x2="185" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="115" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
