<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 12: Sine Wave — continuous flowing sine wave that forms the baseline for the text -->

  <!-- Flowing sine wave -->
  <path d="M10,55 C25,30 40,30 55,55 C70,80 85,80 100,55 C115,30 130,30 145,55 C160,80 175,80 190,55 C205,30 220,30 235,55 C250,80 265,80 280,55 C295,30 310,30 325,55 C340,80 350,80 360,60"
    fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Second wave (phase shifted, creates interference pattern) -->
  <path d="M10,58 C30,38 45,38 60,58 C75,78 90,78 105,58 C120,38 135,38 150,58 C165,78 180,78 195,58 C210,38 225,38 240,58 C255,78 270,78 285,58 C300,38 315,38 330,58 C345,72 355,72 360,62"
    fill="none" stroke="#c8a96e" stroke-width="0.8" stroke-linecap="round" opacity="0.15"/>

  <!-- NJ mark at a wave peak -->
  <g transform="translate(54, 20)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
      font-size="18" letter-spacing="2" fill="#c8a96e" opacity="0.85">NJ</text>
  </g>

  <!-- NICK JENNINGS along the wave -->
  <text x="100" y="35" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>

  <!-- music -->
  <text x="100" y="48" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
