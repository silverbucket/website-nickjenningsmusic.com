<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Concept 11: Sound Hole Rosette — ornate circular pattern inspired by acoustic guitar sound holes -->

  <g transform="translate(48, 50)">
    <!-- Outer rosette ring -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#c8a96e" stroke-width="0.3" opacity="0.2"/>

    <!-- Decorative pattern ring — dashes creating mosaic effect -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#c8a96e" stroke-width="3"
      stroke-dasharray="2.5 2" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c8a96e" stroke-width="2.5"
      stroke-dasharray="4 1.5" opacity="0.15"/>

    <!-- Inner decorative band -->
    <circle cx="0" cy="0" r="27" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#c8a96e" stroke-width="2"
      stroke-dasharray="1.5 3" opacity="0.18"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c8a96e" stroke-width="0.6" opacity="0.3"/>

    <!-- Sound hole void -->
    <circle cx="0" cy="0" r="18" fill="#0a0a0a"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#c8a96e" stroke-width="0.5" opacity="0.4"/>

    <!-- NJ in the void -->
    <text x="0" y="1" text-anchor="middle" dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="14" letter-spacing="2" fill="#c8a96e" opacity="0.8">NJ</text>

    <!-- Tiny "music" below initials -->
    <text x="0" y="10" text-anchor="middle"
      font-family="system-ui, sans-serif"
      font-size="4.5" letter-spacing="1.5" fill="#c8a96e" opacity="0.35">music</text>
  </g>

  <!-- Text: NICK JENNINGS -->
  <text x="110" y="40" font-family="Georgia, 'Times New Roman', serif"
    font-size="14" letter-spacing="3" fill="#f5f0e8" opacity="0.95">NICK JENNINGS</text>
  <line x1="110" y1="48" x2="180" y2="48" stroke="#c8a96e" stroke-width="0.6" opacity="0.35"/>
  <text x="110" y="60" font-family="system-ui, sans-serif"
    font-size="8" letter-spacing="3.5" fill="#c8a96e" opacity="0.5">music</text>
</svg>
