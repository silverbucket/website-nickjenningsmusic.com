<!doctype html>
<html lang="en" vocab="https://schema.org/" typeof="WebSite">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width" />
		<meta name="theme-color" content="#0a0a0a" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
			rel="stylesheet"
		/>
		<title>Nick Jennings — Music</title>
		%sveltekit.head%
		<!-- Matomo -->
		<script>
			var _paq = window._paq = window._paq || [];
			/* tracker methods like "setCustomDimension" should be called before "trackPageView" */
			_paq.push(['disableCookies']);
			_paq.push(['enableHeartBeatTimer']);
			_paq.push(['enableJSErrorTracking']);
			_paq.push(['trackPageView']);
			_paq.push(['enableLinkTracking']);
			_paq.push(['trackAllContentImpressions']);
			(function() {
			var u="//matomo.silverbucket.net/";
			_paq.push(['setTrackerUrl', u+'matomo.php']);
			_paq.push(['setSiteId', '5']);
			var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
			g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
			})();
		</script>
		<!-- End Matomo Code -->
	</head>
	<body data-sveltekit-preload-data="hover">
		<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-gold focus:text-surface focus:px-4 focus:py-2 focus:rounded">Skip to content</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
